<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>EY LIVE Admin - Kullanıcılar</title>

<link rel="stylesheet" href="../css/admin.css">
<link rel="stylesheet" href="../css/users.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="admin">

<aside class="sidebar">

<h2>EY LIVE</h2>

<ul>

<li onclick="location.href='index.html'">📊 Dashboard</li>

<li class="active">👥 Kullanıcılar</li>

<li>🎙 Odalar</li>

<li>🪙 Coin</li>

<li>💎 Diamond</li>

<li>👑 VIP</li>

<li>🏢 Ajans</li>

<li>📢 Duyurular</li>

<li>⚙ Ayarlar</li>

</ul>

</aside>

<main class="content">

<header>

<h1>Kullanıcı Yönetimi</h1>

</header>

<div class="searchBox">

<input id="searchUser" placeholder="ID veya kullanıcı adı ara...">

</div>

<table class="userTable">

<thead>

<tr>

<th>ID</th>

<th>Kullanıcı</th>

<th>VIP</th>

<th>Level</th>

<th>Coin</th>

<th>Durum</th>

<th>İşlem</th>

</tr>

</thead>

<tbody id="userList">

</tbody>

</table>

</main>

</div>

<div id="userModal" class="modal">

<div class="modalBox">

<h2>Kullanıcı Yönet</h2>

<p id="selectedUser"></p>

<div class="grid">

<button id="coinBtn">🪙 Coin Ver</button>

<button id="diamondBtn">💎 Diamond</button>

<button id="vipBtn">👑 VIP</button>

<button id="levelBtn">⭐ Level</button>

<button id="verifyBtn">✔ Doğrula</button>

<button id="streamerBtn">🎤 Yayıncı</button>

<button id="muteBtn">🔇 Sustur</button>

<button id="banBtn">🚫 Banla</button>

</div>

<button id="closeModal">

Kapat

</button>

</div>

</div>

<script src="../js/users.js"></script>

</body>

</html>
