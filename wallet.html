<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EY LIVE - Cüzdan</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/wallet.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="walletPage">

<header class="walletHeader">

<h2>💰 EY LIVE Cüzdan</h2>

</header>

<div class="balanceCard">

<h3>Toplam Coin</h3>

<h1 id="coinBalance">125000</h1>

<p>🪙 Coin Bakiyesi</p>

</div>

<div class="diamondCard">

<h3>Diamond</h3>

<h1 id="diamondBalance">350</h1>

<p>💎 Diamond</p>

</div>

<div class="walletButtons">

<button id="coinTransfer">

Coin Transfer

</button>

<button id="withdraw">

Çekim Talebi

</button>

<button id="history">

Geçmiş

</button>

</div>

<div class="history">

<h3>Son İşlemler</h3>

<div class="historyItem">

+500 Coin (Günlük Ödül)

</div>

<div class="historyItem">

-100 Coin (Slot)

</div>

<div class="historyItem">

+5000 Coin (Jackpot)

</div>

</div>

</div>

<script src="js/wallet.js"></script>

</body>

</html>
